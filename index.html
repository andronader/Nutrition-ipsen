<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NutriPed — تسجيل الدخول</title>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, query, where, getDocs }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyA2Hmm9PWCR2EBpWwopCwACS9iRd7kuCMM",
    authDomain:        "nutrition--pediatric.firebaseapp.com",
    projectId:         "nutrition--pediatric",
    storageBucket:     "nutrition--pediatric.firebasestorage.app",
    messagingSenderId: "230203820487",
    appId:             "1:230203820487:web:8d8c3383de4bd009e3b1e2"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  window._db = db;
  window._fbReady = true;
  window._getDocs = getDocs;
  window._collection = collection;
  window._query = query;
  window._where = where;
  window.dispatchEvent(new Event('fb-ready'));
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap">

<style>
* { box-sizing:border-box; margin:0; padding:0; }
html, body {
  height:100%; font-family:'IBM Plex Sans Arabic', system-ui, sans-serif;
  background: linear-gradient(135deg, #1B3A6B 0%, #2776B8 50%, #3E8FD4 100%);
}

.screen {
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:20px;
}

.card {
  background:#fff;
  border-radius:20px;
  padding:40px 36px;
  width:380px;
  max-width:100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

.logo-wrap {
  text-align:center;
  margin-bottom:28px;
}
.logo-wrap img {
  width:140px;
  margin-bottom:14px;
}
.app-title {
  font-size:22px;
  font-weight:700;
  color:#1B3A6B;
  margin-bottom:4px;
}
.app-sub {
  font-size:13px;
  color:#8AAAC8;
}

.error-box {
  background:#FFEBEE;
  border:1px solid #EF9A9A;
  border-radius:10px;
  padding:12px 16px;
  font-size:13px;
  color:#C62828;
  margin-bottom:16px;
  display:none;
  text-align:center;
}

.field {
  margin-bottom:16px;
}
.field label {
  display:block;
  font-size:12px;
  font-weight:600;
  color:#3A5A8A;
  margin-bottom:6px;
}
.field input {
  width:100%;
  padding:12px 14px;
  border:1.5px solid #C2D4E8;
  border-radius:10px;
  font-size:14px;
  font-family:inherit;
  background:#F7FAFD;
  color:#0F2A52;
  outline:none;
  transition:border-color 0.2s;
}
.field input:focus {
  border-color:#3E8FD4;
  background:#fff;
}

.login-btn {
  width:100%;
  padding:14px;
  background:#1B3A6B;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  font-family:inherit;
  margin-top:8px;
  transition:background 0.2s, transform 0.1s;
}
.login-btn:hover { background:#142E58; }
.login-btn:active { transform:scale(0.98); }
.login-btn:disabled { background:#8AAAC8; cursor:not-allowed; }

.loading {
  display:inline-block;
  width:16px; height:16px;
  border:2px solid rgba(255,255,255,0.4);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  vertical-align:middle;
  margin-left:6px;
}
@keyframes spin { to { transform:rotate(360deg); } }

.footer-txt {
  text-align:center;
  margin-top:20px;
  font-size:11px;
  color:#B0C4D8;
}

.divider {
  border:none;
  border-top:1px solid #E8F0F8;
  margin:20px 0;
}

/* Redirect overlay */
.redirect-screen {
  display:none;
  position:fixed;
  inset:0;
  background: linear-gradient(135deg, #1B3A6B, #3E8FD4);
  z-index:999;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:16px;
  color:#fff;
  font-size:16px;
  font-weight:600;
}
.redirect-screen.show { display:flex; }
.big-spinner {
  width:48px; height:48px;
  border:4px solid rgba(255,255,255,0.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
</style>
</head>
<body>

<!-- Redirect overlay -->
<div class="redirect-screen" id="redirectScreen">
  <div class="big-spinner"></div>
  <div id="redirect-msg">جارٍ تحميل النظام...</div>
</div>

<div class="screen">
  <div class="card">

    <div class="logo-wrap">
      <img src="Ipsen__2_.png" alt="Ipsen" onerror="this.style.display='none'">
      <div class="app-title">NutriPed</div>
      <div class="app-sub">نظام تغذية الأطفال — Ipsen</div>
    </div>

    <div class="error-box" id="err-box"></div>

    <div class="field">
      <label>اسم المستخدم</label>
      <input type="text" id="inp-user" placeholder="أدخل اسم المستخدم" autocomplete="username"
        onkeydown="if(event.key==='Enter') document.getElementById('inp-pass').focus()">
    </div>

    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <button class="login-btn" id="login-btn" onclick="doLogin()">
      🔐 دخول
    </button>

    <hr class="divider">
    <div class="footer-txt">
      NutriPed · Pediatric Nutrition System<br>
      Powered by Ipsen
    </div>

  </div>
</div>

<script>
'use strict';

let fbReady = false;

window.addEventListener('fb-ready', () => {
  fbReady = true;
  // Check existing session
  const saved = sessionStorage.getItem('nutriped_session');
  if (saved) {
    try {
      const user = JSON.parse(saved);
      redirectUser(user);
    } catch(e) {
      sessionStorage.removeItem('nutriped_session');
    }
  }
});

async function doLogin() {
  const username = document.getElementById('inp-user').value.trim();
  const password = document.getElementById('inp-pass').value;
  const errBox   = document.getElementById('err-box');
  const btn      = document.getElementById('login-btn');

  errBox.style.display = 'none';

  if (!username || !password) {
    showError('⚠️ أدخل اسم المستخدم وكلمة المرور');
    return;
  }

  btn.innerHTML = 'جارٍ التحقق <span class="loading"></span>';
  btn.disabled = true;

  // Wait for Firebase if not ready yet
  if (!fbReady) {
    await new Promise(r => setTimeout(r, 2000));
  }

  try {
    const q = window._query(
      window._collection(window._db, 'admins'),
      window._where('username', '==', username),
      window._where('active', '==', true)
    );
    const snap = await window._getDocs(q);

    if (snap.empty) {
      showError('❌ اسم المستخدم غير موجود أو الحساب غير نشط');
      resetBtn(); return;
    }

    const data = snap.docs[0].data();

    if (data.password !== password) {
      showError('❌ كلمة المرور غير صحيحة');
      resetBtn(); return;
    }

    // ✅ Success — save session & redirect
    const user = {
      id:       snap.docs[0].id,
      username: data.username,
      name:     data.name || data.username,
      role:     data.role,
    };
    sessionStorage.setItem('nutriped_session', JSON.stringify(user));
    redirectUser(user);

  } catch(e) {
    showError('❌ خطأ في الاتصال: ' + e.message);
    resetBtn();
  }
}

function redirectUser(user) {
  const screen = document.getElementById('redirectScreen');
  const msg    = document.getElementById('redirect-msg');
  screen.classList.add('show');

  if (user.role === 'superadmin') {
    msg.textContent = `مرحباً ${user.name} 👑 جارٍ فتح لوحة الإدارة...`;
    setTimeout(() => { window.location.href = 'admin.html'; }, 1200);
  } else {
    msg.textContent = `مرحباً ${user.name} 👋 جارٍ فتح النظام...`;
    setTimeout(() => { window.location.href = 'pediatric_nutrition_v3-1.html'; }, 1200);
  }
}

function showError(msg) {
  const b = document.getElementById('err-box');
  b.textContent = msg;
  b.style.display = 'block';
}

function resetBtn() {
  const btn = document.getElementById('login-btn');
  btn.innerHTML = '🔐 دخول';
  btn.disabled = false;
}
</script>
</body>
</html>
